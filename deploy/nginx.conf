# ──────────────────────────────────────────────────────
# deploy/nginx.conf — Nginx 리버스 프록시 설정
# Streamlit WebSocket 지원 필수 (ws:// 연결)
# ──────────────────────────────────────────────────────

# HTTP → HTTPS 리다이렉트 (도메인 있을 때 사용)
server {
    listen 80;
    server_name _;

    # Certbot 인증용 경로 (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # HTTP로 접속하면 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS 설정 ──
server {
    listen 443 ssl http2;
    server_name smecheck.cloud;

    ssl_certificate     /etc/letsencrypt/live/smecheck.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/smecheck.cloud/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 보안 헤더
    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;

    location / {
        proxy_pass         http://streamlit:8501;
        proxy_http_version 1.1;

        # WebSocket 지원 (Streamlit 필수)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # 타임아웃 (Streamlit 세션 유지)
        proxy_read_timeout    86400;
        proxy_connect_timeout 60;
        proxy_send_timeout    60;

        # 버퍼 설정
        proxy_buffering    off;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }
}
